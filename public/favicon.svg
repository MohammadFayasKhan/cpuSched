<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a3d"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <filter id="f1" x="0" y="0">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect x="10" y="10" width="80" height="80" rx="16" fill="url(#g1)" stroke="#3a3a4d" stroke-width="2"/>

  <!-- Top Pins -->
  <line x1="25" y1="5" x2="25" y2="10" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="5" x2="40" y2="10" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="5" x2="55" y2="10" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="5" x2="70" y2="10" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>

  <!-- Bottom Pins -->
  <line x1="25" y1="90" x2="25" y2="95" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="90" x2="40" y2="95" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="90" x2="55" y2="95" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="90" x2="70" y2="95" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>

  <!-- Left Pins -->
  <line x1="5" y1="25" x2="10" y2="25" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="5" y1="40" x2="10" y2="40" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="5" y1="55" x2="10" y2="55" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="5" y1="70" x2="10" y2="70" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>

  <!-- Right Pins -->
  <line x1="90" y1="25" x2="95" y2="25" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="90" y1="40" x2="95" y2="40" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="90" y1="55" x2="95" y2="55" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="90" y1="70" x2="95" y2="70" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>

  <!-- Central Chip Outline -->
  <rect x="25" y="25" width="50" height="50" rx="6" fill="transparent" stroke="#00E5FF" stroke-width="4"/>

  <!-- Gantt Chart Blocks inside Chip -->
  <!-- Block 1 (Cyan) -->
  <rect x="32" y="32" width="12" height="18" rx="2" fill="#00E5FF" filter="url(#f1)"/>
  
  <!-- Block 2 (Orange) -->
  <rect x="46" y="32" width="22" height="18" rx="2" fill="#FF6B00" filter="url(#f1)"/>
  
  <!-- Block 3 (Purple / Idle color) -->
  <rect x="32" y="52" width="22" height="18" rx="2" fill="#b14eff" filter="url(#f1)"/>

  <!-- Block 4 (Gold) -->
  <rect x="56" y="52" width="12" height="18" rx="2" fill="#EAB308" filter="url(#f1)"/>
</svg>